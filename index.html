<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>helix.ai</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background: radial-gradient(800px circle at 50% 0%, rgba(0,212,255,0.08), transparent 60%), #0f172a;
    color:white;
}

.sidebar{
    width:260px;
    height:100vh;
    background:#020617;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
}

.sidebar button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#00d4ff;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.main{
    margin-left:260px;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    text-align:center;
    padding:20px;
}

.big-title{
    color:#00d4ff;
    font-size:46px;
    font-weight:900;
    letter-spacing:-2px;
    text-shadow:0 0 8px rgba(0,212,255,0.6);
}

.subtitle{
    opacity:0.6;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:700px;
    margin-bottom:15px;
    padding:12px;
    border-radius:10px;
}

.user{
    background:#00d4ff;
    color:black;
    margin-left:auto;
}

.bot{
    background:#1e293b;
}

.input-area{
    padding:15px;
    border-top:1px solid #334155;
    display:flex;
    gap:10px;
}

input[type=text]{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:none;
}

button.send{
    background:#00d4ff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.thinking-container{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px;
    background:#1e293b;
    border-left:3px solid orange;
    width:fit-content;
    border-radius:6px;
}

.thinking-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:orange;
    animation:pulse 1.4s infinite;
}

.thinking-dot:nth-child(2){animation-delay:0.2s;}
.thinking-dot:nth-child(3){animation-delay:0.4s;}

@keyframes pulse{
0%,60%,100%{opacity:0.3;transform:scale(0.8)}
30%{opacity:1;transform:scale(1.2)}
}

</style>
</head>

<body>

<div class="sidebar">

<h3>helix.ai</h3>

<button onclick="newChat()">➕ New Chat</button>
<button onclick="login()">Login</button>

<hr>

<div id="chatList"></div>

</div>

<div class="main">

<div class="header">
<div class="big-title">helix.ai</div>
<div class="subtitle">Your Friendly Tutor for all Grades</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">

<input id="messageInput" type="text" placeholder="Ask Helix...">

<input type="file" id="fileInput">

<button class="send" onclick="sendMessage()">Send</button>

</div>

</div>

<script>

let messages=[]

function addMessage(text,role){

const chat=document.getElementById("chat")

const div=document.createElement("div")
div.className="message "+role
div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function thinking(){

const chat=document.getElementById("chat")

const box=document.createElement("div")

box.className="thinking-container"
box.id="thinking"

box.innerHTML=`
Thinking
<div class="thinking-dot"></div>
<div class="thinking-dot"></div>
<div class="thinking-dot"></div>
`

chat.appendChild(box)

}

function stopThinking(){

const t=document.getElementById("thinking")
if(t) t.remove()

}

function sendMessage(){

const input=document.getElementById("messageInput")

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

thinking()

setTimeout(()=>{

stopThinking()

// placeholder AI response
addMessage("I'm Helix! Connect me to an AI API to answer this question.","bot")

},1200)

}

function newChat(){

document.getElementById("chat").innerHTML=""

addMessage("👋 Hey there! I'm Helix!","bot")

}

function login(){
alert("Login system requires backend (Google Auth / Firebase)")
}

newChat()

</script>

</body>
</html>
