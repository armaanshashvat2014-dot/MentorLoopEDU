<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartBot AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
border-right:1px solid #1e293b;
}

.logo{
font-size:28px;
font-weight:900;
color:#00d4ff;
margin-bottom:10px;
}

.newchat{
padding:10px;
border:none;
border-radius:6px;
background:#00d4ff;
color:black;
font-weight:bold;
cursor:pointer;
}

.chat-history{
flex:1;
overflow-y:auto;
margin-top:15px;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
display:flex;
justify-content:space-between;
}

.chat-item:hover{
background:#1e293b;
}

.delete{
color:#ff6b6b;
cursor:pointer;
font-weight:bold;
}

/* Main */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* Header */

.header{
text-align:center;
padding:15px;
border-bottom:1px solid #1e293b;
}

.title{
font-size:34px;
font-weight:900;
color:#00d4ff;
}

/* Chat */

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* Messages */

.message{
max-width:700px;
padding:12px;
border-radius:10px;
line-height:1.5;
display:flex;
flex-direction:column;
}

.user{
background:#00d4ff;
color:black;
align-self:flex-end;
}

.bot{
background:#1e293b;
align-self:flex-start;
}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
}

/* Input */

.input-area{
border-top:1px solid #1e293b;
padding:15px;
display:flex;
gap:10px;
}

input[type=text]{
flex:1;
padding:12px;
border-radius:8px;
border:none;
font-size:15px;
}

button.send{
padding:10px 18px;
border:none;
background:#00d4ff;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* Thinking */

.thinking{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:#00d4ff;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}

@keyframes blink{
0%,60%,100%{opacity:0.3}
30%{opacity:1}
}

.preview{
max-width:250px;
border-radius:6px;
margin-top:5px;
}

.filelabel{
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">SmartBot</div>
<button class="newchat" onclick="newChat()">+ New Chat</button>
<div class="chat-history" id="history"></div>
</div>

<div class="main">

<div class="header">
<div class="title">SmartBot AI</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" type="text" placeholder="Ask SmartBot...">
<input type="file" id="file">
<button class="send" onclick="send()">Send</button>
</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("smartbotChats")) || {}
let currentChat = null

function saveChats(){
localStorage.setItem("smartbotChats", JSON.stringify(chats))
}

function now(){
return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
}

function renderHistory(){
const history=document.getElementById("history")
history.innerHTML=""

Object.keys(chats).forEach(id=>{

const item=document.createElement("div")
item.className="chat-item"

const title=document.createElement("span")
title.innerText=chats[id].title
title.onclick=()=>loadChat(id)

const del=document.createElement("span")
del.innerText="×"
del.className="delete"
del.onclick=()=>deleteChat(id)

item.appendChild(title)
item.appendChild(del)
history.appendChild(item)

})
}

function newChat(){
const id="chat"+Date.now()

chats[id]={
title:"New Chat",
messages:[]
}

currentChat=id

saveChats()
renderHistory()
renderChat()
}

function deleteChat(id){

delete chats[id]

if(currentChat===id)
currentChat=null

saveChats()
renderHistory()

if(Object.keys(chats).length===0)
newChat()
else
loadChat(Object.keys(chats)[0])

}

function loadChat(id){
currentChat=id
renderChat()
}

function renderChat(){

const chat=document.getElementById("chat")
chat.innerHTML=""

if(!currentChat) return

chats[currentChat].messages.forEach(m=>{

const div=document.createElement("div")
div.className="message "+m.role

const text=document.createElement("div")
text.innerText=m.text
div.appendChild(text)

if(m.image){
const img=document.createElement("img")
img.src=m.image
img.className="preview"
div.appendChild(img)
}

if(m.file){
const label=document.createElement("div")
label.className="filelabel"
label.innerText="📎 "+m.file
div.appendChild(label)
}

const time=document.createElement("div")
time.className="time"
time.innerText=m.time
div.appendChild(time)

chat.appendChild(div)

})

chat.scrollTop=chat.scrollHeight
}

function addMessage(role,text,image=null,file=null){

chats[currentChat].messages.push({
role,
text,
time:now(),
image,
file
})

if(chats[currentChat].title==="New Chat")
chats[currentChat].title=text.slice(0,25)

saveChats()
renderHistory()
renderChat()
}

function thinking(){

const chat=document.getElementById("chat")

const box=document.createElement("div")
box.className="message bot"
box.id="thinking"

box.innerHTML='<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'

chat.appendChild(box)
chat.scrollTop=chat.scrollHeight

}

function stopThinking(){
const t=document.getElementById("thinking")
if(t) t.remove()
}

function send(){

const input=document.getElementById("input")
const file=document.getElementById("file")

const text=input.value.trim()

if(!text && !file.files.length) return

let image=null
let filename=null

if(file.files.length){

const f=file.files[0]
filename=f.name

if(f.type.startsWith("image")){

const reader=new FileReader()

reader.onload=e=>{
image=e.target.result
addMessage("user",text,image,filename)
reply(text)
}

reader.readAsDataURL(f)

}else{

addMessage("user",text,null,filename)
reply(text)

}

file.value=""

}else{

addMessage("user",text)
reply(text)

}

input.value=""
}

function reply(text){

thinking()

setTimeout(()=>{

stopThinking()

let reply="I'm SmartBot 🤖. Connect me to an AI API."

if(text.toLowerCase().includes("math"))
reply="I can help solve math problems. Try asking an equation."

if(text.toLowerCase().includes("science"))
reply="Science question detected 🔬. Ask me anything."

if(text.toLowerCase().includes("hello"))
reply="Hello! I'm SmartBot, your AI tutor."

addMessage("bot",reply)

},900)

}

document.getElementById("input").addEventListener("keypress",function(e){
if(e.key==="Enter") send()
})

renderHistory()

if(Object.keys(chats).length===0)
newChat()
else
loadChat(Object.keys(chats)[0])

</script>

</body>
</html>
