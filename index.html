<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartBot</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.chat{
height:80vh;
overflow:auto;
padding:20px;
}

.message{
padding:10px;
margin:10px 0;
border-radius:8px;
max-width:600px;
}

.user{
background:#00d4ff;
color:black;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #333;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
margin-left:5px;
border:none;
background:#00d4ff;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="question" placeholder="Ask SmartBot...">
<button onclick="ask()">Send</button>
</div>

<script>

function add(role,text){

const div=document.createElement("div")
div.className="message "+role
div.innerText=text

document.getElementById("chat").appendChild(div)

}

async function ask(){

const input=document.getElementById("question")

const q=input.value.trim()

if(!q) return

add("user",q)

input.value=""

add("bot","Thinking...")

try{

const res=await fetch("https://api.allorigins.win/raw?url=https://api.duckduckgo.com/?q="+encodeURIComponent(q)+"&format=json")

const data=await res.json()

const answer=data.Abstract || data.Answer || "I couldn't find an answer."

document.querySelectorAll(".bot").pop?.remove

document.getElementById("chat").lastChild.remove()

add("bot",answer)

}catch{

document.getElementById("chat").lastChild.remove()

add("bot","Error getting answer.")

}

}

</script>

</body>
</html>
