<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop Study Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
color:#22d3ee;
}

select,button{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
background:#22d3ee;
font-weight:bold;
cursor:pointer;
}

#pdfViewer{
width:100%;
height:560px;
border:none;
border-radius:16px;
display:none;
margin-top:20px;
box-shadow:0 0 25px rgba(34,211,238,.15);
}

#hintBox{
margin-top:15px;
color:#facc15;
font-weight:bold;
}

#weakBox{
margin-top:15px;
color:#f87171;
font-weight:bold;
}

#status{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

#quizBox{
display:none;
margin-top:25px;
background:#1e293b;
padding:25px;
border-radius:18px;
}

.option{
padding:12px;
margin-top:10px;
background:#334155;
border-radius:10px;
cursor:pointer;
}

.option:hover{
background:#22d3ee;
color:black;
}
</style>
</head>
<body>

<div class="container">
<h1>📚 MentorLoop Study Mode</h1>

<select id="gradeSelect" onchange="loadTopics()">
<option value="">Select Grade</option>
<option value="7">Grade 7</option>
<option value="9">Grade 9</option>
</select>

<select id="topicSelect">
<option value="">Select Topic</option>
</select>

<br>

<button onclick="openBook()">Open Book</button>
<button onclick="showHint()">Hint</button>
<button onclick="startQuiz()">Take Test</button>

<div id="status"></div>
<div id="hintBox"></div>
<div id="weakBox"></div>

<iframe id="pdfViewer"></iframe>

<div id="quizBox"></div>
</div>

<script>
let activeTopic="";
let activeGrade="";
let tabSwitches=0;

const books={
  "7":{
    "Math":"CIE_7_SB_1%20(3).pdf",
    "English":"CIE_7_SB_1_Eng%20(2).pdf",
    "Science":"CIE_7_SB_1_Sci.pdf"
  },
  "9":{
    "Book 1":"CIE_9_SB_1%20(5).pdf",
    "Book 2":"CIE_9_SB_2%20(1).pdf"
  }
};

const hints={
  "Math":"Break difficult problems into smaller steps.",
  "English":"Look at context clues around difficult words.",
  "Science":"Focus on why the process happens.",
  "Book 1":"Read the examples before solving.",
  "Book 2":"Review the summary before the quiz."
};

const quizzes={
  "Math":{
    q:"What is 25% of 80?",
    options:["10","20","25","30"],
    answer:1
  },
  "English":{
    q:"A synonym of 'rapid' is?",
    options:["slow","quick","small","weak"],
    answer:1
  },
  "Science":{
    q:"Plants make food using?",
    options:["Respiration","Photosynthesis","Digestion","Absorption"],
    answer:1
  },
  "Book 1":{
    q:"Solve: x + 5 = 12",
    options:["5","6","7","8"],
    answer:2
  },
  "Book 2":{
    q:"Force unit is?",
    options:["Joule","Newton","Watt","Volt"],
    answer:1
  }
};

function loadTopics(){
  const grade=gradeSelect.value;
  topicSelect.innerHTML='<option value="">Select Topic</option>';

  if(!books[grade]) return;

  Object.keys(books[grade]).forEach(topic=>{
    topicSelect.innerHTML += `<option value="${topic}">${topic}</option>`;
  });
}

function openBook(){
  activeGrade=gradeSelect.value;
  activeTopic=topicSelect.value;

  if(!activeGrade || !activeTopic){
    alert("Choose grade and topic");
    return;
  }

  const file=books[activeGrade][activeTopic];

  pdfViewer.src=file;
  pdfViewer.style.display="block";

  status.innerText="📖 Studying " + activeTopic;
  hintBox.innerText="";
  weakBox.innerText="";
  quizBox.style.display="none";

  document.documentElement.requestFullscreen?.();
}

function showHint(){
  if(!activeTopic) return;
  hintBox.innerText="💡 " + (hints[activeTopic] || "Review the chapter carefully.");
}

function startQuiz(){
  if(!activeTopic) return;

  const quiz=quizzes[activeTopic];
  if(!quiz){
    alert("Quiz not available yet.");
    return;
  }

  quizBox.style.display="block";

  quizBox.innerHTML=
    `<h2>📝 Quick Test</h2>
     <h3>${quiz.q}</h3>`+
    quiz.options.map((o,i)=>
      `<div class="option" onclick="checkAnswer(${i})">${o}</div>`
    ).join("");
}

function checkAnswer(index){
  const quiz=quizzes[activeTopic];

  if(index===quiz.answer){
    status.innerText="✅ Good understanding";
    weakBox.innerText="";
  }else{
    status.innerText="❌ Needs revision";
    weakBox.innerText="⚠ Weak Topic Detected: " + activeTopic;
  }
}

document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    tabSwitches++;

    if(tabSwitches>=3){
      alert("Study mode closed due to repeated tab switching.");
      location.reload();
    }
  }
});
</script>

</body>
</html>
